name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    # Intel runner: resources/bin/mac binaries (tesseract etc.) are bundled as x86_64
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app
        run: sh build.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/dissolution.app dissolution-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: dissolution-macos
          path: dissolution-macos.zip
